<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="styles/index.css" />
    <title>Jogo da Bugalha</title>
  </head>
  <body>
    <div class="game-content">
      <div class="left-box">
        <div class="info-box">
          <img src="./styles/images/p1.jpg" class="avatar" />
          <span class="player-name">Salsicha Auras</span>
          <span class="player-score">67</span>
          <div class="info-dado"></div>
        </div>
      </div>

      <div class="mid-box">
        <div class="top-box">
          <div class="box">
            <div class="dado face-1"></div>
            <div class="dado face-1"></div>
            <div class="dado face-1"></div>
            <span class="num">10</span>
          </div>
          <div class="box">
            <div class="dado face-1"></div>
            <div class="dado face-1"></div>
            <div class="dado face-1"></div>
            <span class="num">25</span>
          </div>
          <div class="box">
            <div class="dado face-1"></div>
            <div class="dado face-1"></div>
            <div class="dado face-1"></div>
            <span class="num">3</span>
          </div>
        </div>

        <div class="bottom-box">
          <div class="box">
            <span class="num">11</span>
            <div class="dado face-1"></div>
            <div class="dado face-1"></div>
            <div class="dado face-1"></div>
          </div>
          <div class="box">
            <span class="num">36</span>
            <div class="dado face-1"></div>
            <div class="dado face-1"></div>
            <div class="dado face-1"></div>
          </div>
          <div class="box">
            <span class="num">5</span>
            <div class="dado face-1"></div>
            <div class="dado face-1"></div>
            <div class="dado face-1"></div>
          </div>
        </div>
      </div>
      <div class="right-box">
        <div class="info-box">
          <img src="./styles/images/p2.jpg" class="avatar" />
          <span class="player-name">Satoru Banguela</span>
          <span class="player-score">38</span>
          <div class="info-dado"></div>
        </div>
      </div>
    </div>
  </body>
  <script type="module" src="/src/scripts/index.js"></script>
</html>
