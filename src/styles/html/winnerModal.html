<div class="winner-overlay">
  <div class="winner-popup">
    <span class="winner-kicker">Fim de jogo</span>
    <h2 class="winner-title">Vencedor</h2>
    <p class="winner-scoreline"></p>
    <div class="winner-actions">
      <button class="winner-button" data-winner-action="continue" type="button">
        Continuar jogo
      </button>
      <button class="winner-button secondary" data-winner-action="restart" type="button">
        Voltar ao inicio
      </button>
    </div>
  </div>
</div>
